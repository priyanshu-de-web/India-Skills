<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Upload Progressbar - Express</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #container {
            width: 400px;
        }

        #container form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            gap: 10px;
        }

        #container .progressbar-box {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,.05);
            border-radius: 10px;
            overflow: hidden;
        }

        #container .progressbar-item {
            height: 100%;
            background: #4fd6ff;
            transition: .3s;
            width: 0;
        }

        button {
            padding: 10px 20px;
            background: #4fd6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #3bc5ee;
        }

        .status {
            margin-top: 10px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<div id="container">
    <form action="" onsubmit="submitFile(event)">
        <input type="file" id="fileInput">
        <button type="submit">Upload</button>
    </form>

    <div class="progressbar-box">
        <div class="progressbar-item"></div>
    </div>
    
    <div class="status" id="status"></div>
</div>

<script>
    const $fileInput = document.querySelector("#fileInput");
    const $progressItem = document.querySelector(".progressbar-item");
    const $status = document.querySelector("#status");
    
    const submitFile = e => {
        e.preventDefault();
        progressbarSetWidth(0);
        $status.textContent = '';

        const file = $fileInput.files[0];
        if(!file) {
            alert("Select file");
            return;
        }

        const body = new FormData();
        body.append("file", file);

        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener("progress", progress);
        
        xhr.onload = function() {
            if (xhr.status === 200) {
                const response = JSON.parse(xhr.responseText);
                if (response.message === 'success') {
                    $status.textContent = `Upload complete: ${response.original_name}`;
                    $status.style.color = 'green';
                } else {
                    $status.textContent = `Upload failed: ${response.error}`;
                    $status.style.color = 'red';
                }
            }
        };
        
        xhr.onerror = function() {
            $status.textContent = 'Upload error occurred';
            $status.style.color = 'red';
        };

        xhr.open("post", "/upload");
        xhr.send(body);
    }

    const progress = e => {
        const percent = (e.loaded / e.total * 100).toFixed(1);
        progressbarSetWidth(percent + "%");
        $status.textContent = `Uploading: ${percent}%`;
        $status.style.color = '#666';
    }

    const progressbarSetWidth = width => {
        $progressItem.style.width = width;
    }
</script>

</body>
</html>
